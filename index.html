<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Appel API UCDP</title>
    <link rel="stylesheet" href="style/style.css" />
  </head>

  <body>
    <main>
      <div class="containeer">
        <h1>Données UCDP</h1>
        <button id="fetch-btn">Récupérer les événements</button>
        <pre id="result">Les résultats s'afficheront ici...</pre>
      </div>
      <section>


        <form class="recherche-form">
          <input
            type="text"
            class="champ-texte"
            placeholder="Entrez votre nom de pays..."
            list="suggestions-pays" />
          <datalist id="suggestions-pays"></datalist>
          <button type="submit" class="bouton-submit">Envoyer</button>
        </form>

        
        <div id="resultat-pays" class="parent" >
        </div>
      </section>
    </main>

    <script type="module" src="src/main.js"></script>
  </body>
</html>
