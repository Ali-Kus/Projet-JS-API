<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>API Census - Analyse Démographique Mondiale</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <!-- Sidebar Favoris -->
      <aside class="sidebar">
        <h2>Favoris</h2>
        <div id="favorites-list" class="favorites-list">
          <p id="empty-favorites-msg">Aucune recherche favorite</p>
        </div>
        <div class="sidebar-help">
          <a
            href="aide.html"
            class="help-link"
            target="_blank"
            title="Aide rapide"
          >
            ❓ Aide
          </a>
        </div>
      </aside>

      <!-- Contenu Principal -->
      <main class="main-content">
        <header>
          <h1>Analyse Démographique Mondiale</h1>
          <p class="subtitle">API Census - Données Mondiales de Population</p>
        </header>

        <!-- Formulaire de Recherche -->
        <section class="search-section">
          <div class="search-container">
            <input
              type="text"
              id="input-search"
              list="countries-list"
              placeholder="Entrez le nom d'un pays..."
              aria-label="Rechercher un pays"
            />
            <datalist id="countries-list"></datalist>
            <select id="select-year" aria-label="Année de référence"></select>
            <button id="btn-search" disabled aria-label="Lancer la recherche">
              Rechercher
            </button>
          </div>
        </section>

        <!-- Loader d'attente -->
        <div id="bloc-gif-attente" class="loader-container hidden">
          <div class="spinner"></div>
          <p>Chargement des données...</p>
        </div>

        <!-- Zone des Résultats -->
        <section class="results-section">
          <div id="results-container" class="results-container">
            <p id="no-results-msg" class="message">
              Veillez lancer une recherche
            </p>
          </div>
        </section>

        <!-- Zone d'erreur -->
        <div id="error-container" class="error-container hidden" role="alert">
          <p id="error-message"></p>
        </div>
      </main>
    </div>

    <!-- Chart.js Library -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

    <!-- Scripts avec modules ES6 -->
    <script type="module" src="src/main.js"></script>
  </body>
</html>
